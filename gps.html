<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro GPS Locator & Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 { color: var(--accent); margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 20px; }

        /* Map Container */
        #map {
            height: 400px;
            width: 100%;
            border-radius: 15px;
            margin: 20px 0;
            background: #000;
            border: 2px solid #334155;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .stat-label { font-size: 0.8em; color: var(--accent); text-transform: uppercase; }
        .stat-value { font-size: 1.2em; font-weight: bold; margin-top: 5px; }

        .btn {
            background: var(--accent);
            color: var(--bg);
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn:disabled { background: #475569; cursor: not-allowed; }

        .status-dot {
            height: 10px; width: 10px; border-radius: 50%; display: inline-block;
            background: #ef4444; margin-right: 5px;
        }
        .online { background: var(--success); box-shadow: 0 0 10px var(--success); }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Live GPS Tracker</h1>
        <p>User ki location real-time mein track karein</p>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Latitude</div>
                <div id="lat" class="stat-value">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Longitude</div>
                <div id="lng" class="stat-value">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Accuracy</div>
                <div id="acc" class="stat-value">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Status</div>
                <div id="status-text" class="stat-value">
                    <span class="status-dot" id="dot"></span> Offline
                </div>
            </div>
        </div>

        <button class="btn" id="locate-btn">📍 Get My Location</button>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const latDisplay = document.getElementById('lat');
        const lngDisplay = document.getElementById('lng');
        const accDisplay = document.getElementById('acc');
        const btn = document.getElementById('locate-btn');
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('status-text');

        // 1. Initialize Map (Default view: India coordinates)
        let map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let marker, circle;

        // 2. Success Callback
        function success(position) {
            const { latitude, longitude, accuracy } = position.coords;

            // Update UI
            latDisplay.innerText = latitude.toFixed(6);
            lngDisplay.innerText = longitude.toFixed(6);
            accDisplay.innerText = `± ${Math.round(accuracy)}m`;
            
            dot.classList.add('online');
            statusText.innerHTML = `<span class="status-dot online"></span> Active`;

            // Update Map
            const coords = [latitude, longitude];
            map.setView(coords, 16);

            // Remove old marker/circle if exists
            if (marker) map.removeLayer(marker);
            if (circle) map.removeLayer(circle);

            // Add new marker
            marker = L.marker(coords).addTo(map)
                .bindPopup('Aap yahan hain!').openPopup();

            // Add accuracy circle
            circle = L.circle(coords, { radius: accuracy, color: '#38bdf8' }).addTo(map);
            
            btn.innerText = "Location Updated!";
            btn.disabled = false;
        }

        // 3. Error Callback
        function error(err) {
            btn.disabled = false;
            btn.innerText = "Try Again";
            alert(`Location access denied! Error Code: ${err.code}`);
        }

        // 4. Button Click Logic
        btn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert("Aapka browser GPS support nahi karta!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Locating...";

            // Geolocation Options
            const options = {
                enableHighAccuracy: true, // Use GPS if available
                timeout: 10000,           // 10 seconds wait
                maximumAge: 0             // No cached location
            };

            // Main API Call
            navigator.geolocation.getCurrentPosition(success, error, options);
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Mobile Tracker Pro</title>
    <style>
        :root {
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: radial-gradient(circle at center, #1a1a2e, #16213e, #0f3460);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8);
        }

        h1 { font-size: 2rem; margin-bottom: 10px; text-shadow: 0 0 10px var(--accent); }

        .search-box {
            display: flex;
            gap: 10px;
            margin: 30px 0;
        }

        input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .track-btn {
            background: var(--accent);
            color: #1a1a2e;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .track-btn:hover { box-shadow: 0 0 20px var(--accent); transform: scale(1.05); }

        /* Results Styling */
        .info-card {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .label { color: var(--accent); font-size: 0.9rem; }
        .val { font-weight: bold; }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Global Tracker</h1>
        <p>Enter number with Country Code (e.g. +91)</p>

        <div class="search-box">
            <input type="text" id="phoneInput" placeholder="+919876543210">
            <button class="track-btn" onclick="fetchData()">TRACK</button>
        </div>

        <div class="loader" id="loader"></div>

        <div class="info-card" id="infoCard">
            <div class="data-row"><span class="label">Valid:</span> <span id="resValid" class="val">--</span></div>
            <div class="data-row"><span class="label">Country:</span> <span id="resCountry" class="val">--</span></div>
            <div class="data-row"><span class="label">Location:</span> <span id="resLocation" class="val">--</span></div>
            <div class="data-row"><span class="label">Carrier:</span> <span id="resCarrier" class="val">--</span></div>
            <div class="data-row"><span class="label">Line Type:</span> <span id="resType" class="val">--</span></div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const number = document.getElementById('phoneInput').value;
            const loader = document.getElementById('loader');
            const card = document.getElementById('infoCard');

            if(!number.includes('+')) {
                alert("Please include country code with + (e.g. +91)");
                return;
            }

            // UI Reset
            loader.style.display = 'block';
            card.style.display = 'none';

            // API Configuration
            // Note: Get your free key at numverify.com
            const apiKey = 'YOUR_FREE_API_KEY'; 
            const url = `http://apilayer.net/api/validate?access_key=${apiKey}&number=${number}`;

            try {
                // Real API Call
                const response = await fetch(url);
                const data = await response.json();

                if (data.valid) {
                    document.getElementById('resValid').innerText = "✅ Yes";
                    document.getElementById('resValid').style.color = "#00ff00";
                    document.getElementById('resCountry').innerText = data.country_name;
                    document.getElementById('resLocation').innerText = data.location || "Not Found";
                    document.getElementById('resCarrier').innerText = data.carrier || "Unknown";
                    document.getElementById('resType').innerText = data.line_type || "N/A";
                    card.style.display = 'block';
                } else {
                    alert("Invalid Number or API Error!");
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("Connection Error or API Limit Reached!");
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>

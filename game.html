<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Location Tracker | City & Region</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #6366f1;
            --bg: #05070a;
            --card-bg: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .main-card {
            width: 100%; max-width: 950px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid #1f2937;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 10px; }
        .header p { color: #9ca3af; }

        /* Search Section */
        .search-box {
            display: flex; gap: 12px; margin-bottom: 30px;
        }

        input {
            flex: 1; padding: 16px; border-radius: 12px;
            border: 2px solid #374151; background: #0b0f1a;
            color: white; font-size: 1.1rem; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }

        .btn {
            padding: 0 30px; background: var(--primary);
            color: #000; border: none; border-radius: 12px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3); }

        /* Area Display Grid */
        .area-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }

        .data-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px; border-radius: 16px;
            border: 1px solid #374151; position: relative; overflow: hidden;
        }

        .data-card::before {
            content: ""; position: absolute; left: 0; top: 0; 
            height: 100%; width: 4px; background: var(--secondary);
        }

        .label { font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 1.3rem; font-weight: 700; margin-top: 8px; color: #f3f4f6; }

        #map {
            height: 450px; width: 100%;
            border-radius: 20px; border: 1px solid #374151;
            z-index: 1;
        }

        .loading-overlay {
            display: none; color: var(--primary); font-weight: bold; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="header">
            <h1>IP Area Intelligence</h1>
            <p>Locate any IP Address with City & Region details</p>
        </div>

        <div class="search-box">
            <input type="text" id="ipField" placeholder="Enter IP (e.g., 103.21.161.0) or leave empty for yours">
            <button class="btn" onclick="locateIP()">TRACK AREA</button>
        </div>

        <div id="loader" class="loading-overlay">🔍 Searching Database...</div>

        <div class="area-grid">
            <div class="data-card">
                <div class="label">City</div>
                <div id="cityVal" class="value">--</div>
            </div>
            <div class="data-card">
                <div class="label">Region / State</div>
                <div id="regionVal" class="value">--</div>
            </div>
            <div class="data-card">
                <div class="label">Country</div>
                <div id="countryVal" class="value">--</div>
            </div>
            <div class="data-card">
                <div class="label">Network Provider</div>
                <div id="ispVal" class="value">--</div>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Map Initialization
        let map = L.map('map').setView([20, 77], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap Contributors'
        }).addTo(map);
        let marker;

        async function locateIP() {
            const ipInput = document.getElementById('ipField').value.trim();
            const loader = document.getElementById('loader');
            
            loader.style.display = 'block';

            // Using ipapi.co which is very reliable for City/Region
            const apiURL = ipInput ? `https://ipapi.co/${ipInput}/json/` : `https://ipapi.co/json/`;

            try {
                const response = await fetch(apiURL);
                const data = await response.json();

                if (data.error) {
                    alert("IP Info not found! Please check the IP address.");
                } else {
                    // Updating City and Region (Exact requirement)
                    document.getElementById('cityVal').innerText = data.city || "Not Found";
                    document.getElementById('regionVal').innerText = data.region || "Not Found";
                    document.getElementById('countryVal').innerText = data.country_name || "N/A";
                    document.getElementById('ispVal').innerText = data.org || "N/A";

                    // Map Update Logic
                    const lat = data.latitude;
                    const lon = data.longitude;

                    if (marker) map.removeLayer(marker);
                    
                    map.flyTo([lat, lon], 12); // Smooth zoom to city
                    marker = L.marker([lat, lon]).addTo(map)
                        .bindPopup(`<b>${data.city}</b>, ${data.region}`).openPopup();
                }
            } catch (err) {
                console.error("Tracking Error:", err);
                alert("Network error. Try disabling Ad-blockers.");
            } finally {
                loader.style.display = 'none';
            }
        }

        // Run on Page Load for user's own IP
        window.onload = locateIP;
    </script>
</body>
</html>

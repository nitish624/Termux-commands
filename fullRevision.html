<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate JS/CSS/HTML Master Project</title>
    <style>
        /* CSS: ADVANCED STYLING & VARIABLES */
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --danger: #e74c3c;
            --success: #2ecc71;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body { 
            background: var(--light); 
            color: var(--dark); 
            transition: all 0.4s ease;
        }

        body.dark-mode {
            background: #1a1a1a;
            color: white;
        }

        /* LAYOUT: GRID & FLEX */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--dark);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: var(--card-shadow);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        /* CARDS */
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s;
        }

        body.dark-mode .card { background: #333; }

        .card:hover { transform: translateY(-5px); }

        h2 { margin-bottom: 15px; border-bottom: 2px solid var(--primary); display: inline-block; }

        /* INTERACTIVE ELEMENTS */
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        /* TASK LIST STYLING */
        ul { list-style: none; margin-top: 15px; }
        li {
            background: #f9f9f9;
            margin: 5px 0;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            border-radius: 5px;
            color: #333;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>ConceptMaster Dashboard</h1>
                <p id="live-timer">Loading time...</p>
            </div>
            <button class="btn btn-primary" id="theme-toggle">🌓 Toggle Theme</button>
        </header>

        <div class="dashboard-grid">
            
            <section class="card animate">
                <h2>🌍 Live Weather (API)</h2>
                <div id="weather-content">
                    <p>Fetching real-time data from London...</p>
                </div>
                <button class="btn btn-primary" onclick="fetchWeather()" style="margin-top:10px;">Refresh Weather</button>
            </section>

            <section class="card animate">
                <h2>📝 Smart To-Do (Local Storage)</h2>
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="Enter task name...">
                    <select id="todo-priority">
                        <option value="Low">Low Priority</option>
                        <option value="High">High Priority</option>
                    </select>
                    <button class="btn btn-primary" id="add-todo">Add Task</button>
                </div>
                <ul id="todo-list"></ul>
                <p style="margin-top:10px; font-size: 0.8em;" id="task-stats">Total Tasks: 0</p>
            </section>

            <section class="card animate">
                <h2>🧮 Tip Calculator (Logic)</h2>
                <label>Bill Amount ($)</label>
                <input type="number" id="bill-amount" value="100">
                <label>Tip Percentage (%)</label>
                <input type="range" id="tip-range" min="0" max="50" value="15">
                <p>Tip: <span id="tip-val">15</span>%</p>
                <h3 id="total-bill" style="color: var(--success); margin-top:10px;">Total: $115</h3>
            </section>

            <section class="card animate">
                <h2>🔍 Search Filter (Arrays)</h2>
                <input type="text" id="search-input" placeholder="Search tech stack...">
                <div id="tech-list" style="display: flex; flex-wrap: wrap; gap: 5px;"></div>
            </section>

        </div>
    </div>

    <script>
        // ==========================================
        // 1. GLOBAL SETTINGS & THEME
        // ==========================================
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Load saved theme
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        // ==========================================
        // 2. LIVE CLOCK (Intervals)
        // ==========================================
        function updateTime() {
            const now = new Date();
            document.getElementById('live-timer').innerText = now.toLocaleString();
        }
        setInterval(updateTime, 1000);

        // ==========================================
        // 3. API FETCH (Weather)
        // ==========================================
        async function fetchWeather() {
            const display = document.getElementById('weather-content');
            try {
                // Real Workable API: Open-Meteo
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5074&longitude=-0.1278&current_weather=true');
                const data = await res.json();
                const temp = data.current_weather.temperature;
                const wind = data.current_weather.windspeed;
                
                display.innerHTML = `
                    <div style="background: var(--primary); color: white; padding: 15px; border-radius: 10px;">
                        <h3>London, UK</h3>
                        <p style="font-size: 2em;">${temp}°C</p>
                        <p>Wind Speed: ${wind} km/h</p>
                    </div>
                `;
            } catch (error) {
                display.innerHTML = "<p style='color:red;'>Failed to load API data.</p>";
            }
        }
        fetchWeather();

        // ==========================================
        // 4. TASK MANAGER (CRUD & Arrays)
        // ==========================================
        let tasks = JSON.parse(localStorage.getItem('master_tasks')) || [];
        const todoInput = document.getElementById('todo-input');
        const todoPriority = document.getElementById('todo-priority');
        const todoList = document.getElementById('todo-list');

        function updateTasks() {
            todoList.innerHTML = '';
            tasks.forEach((t, i) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span><strong>[${t.priority}]</strong> ${t.text}</span>
                    <button class="btn btn-danger" onclick="deleteTask(${i})" style="padding: 2px 8px;">X</button>
                `;
                todoList.appendChild(li);
            });
            document.getElementById('task-stats').innerText = `Total Tasks: ${tasks.length}`;
            localStorage.setItem('master_tasks', JSON.stringify(tasks));
        }

        document.getElementById('add-todo').addEventListener('click', () => {
            if(!todoInput.value) return alert("Kuch toh likho!");
            tasks.push({ text: todoInput.value, priority: todoPriority.value });
            todoInput.value = '';
            updateTasks();
        });

        function deleteTask(index) {
            tasks.splice(index, 1);
            updateTasks();
        }
        updateTasks();

        // ==========================================
        // 5. CALCULATION LOGIC (Event Listeners)
        // ==========================================
        const billInput = document.getElementById('bill-amount');
        const tipRange = document.getElementById('tip-range');
        const tipValDisplay = document.getElementById('tip-val');
        const totalDisplay = document.getElementById('total-bill');

        const calculateTip = () => {
            const bill = parseFloat(billInput.value);
            const tipPercent = tipRange.value;
            tipValDisplay.innerText = tipPercent;
            const total = bill + (bill * (tipPercent / 100));
            totalDisplay.innerText = `Total: $${total.toFixed(2)}`;
        };

        billInput.addEventListener('input', calculateTip);
        tipRange.addEventListener('input', calculateTip);

        // ==========================================
        // 6. SEARCH & FILTER (Array Methods)
        // ==========================================
        const techStack = ['HTML5', 'CSS3', 'JavaScript', 'React', 'Node.js', 'Python', 'MongoDB', 'SQL', 'TypeScript', 'Next.js'];
        const searchInput = document.getElementById('search-input');
        const techListDisplay = document.getElementById('tech-list');

        const filterTech = (query = '') => {
            techListDisplay.innerHTML = '';
            const filtered = techStack.filter(item => item.toLowerCase().includes(query.toLowerCase()));
            filtered.forEach(item => {
                const span = document.createElement('span');
                span.innerText = item;
                span.style.cssText = "background: #eee; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; border: 1px solid #ccc; color: #333";
                techListDisplay.appendChild(span);
            });
        };

        searchInput.addEventListener('input', (e) => filterTech(e.target.value));
        filterTech(); // Initial load

    </script>
</body>
</html>
